name: Refresh Roadmap Card

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Download roadmap card
        run: |
          python3 - <<'EOF'
          import requests, os
          os.makedirs("assets", exist_ok=True)
          url = "https://roadmap.sh/card/wide/69e6213335198b31d667bc82?variant=dark"
          headers = {"Accept": "image/svg+xml,image/*", "User-Agent": "Mozilla/5.0"}
          r = requests.get(url, headers=headers, allow_redirects=True, timeout=30)
          print(f"Status: {r.status_code}, Content-Type: {r.headers.get('content-type')}, Size: {len(r.content)}")
          with open("assets/roadmap-card.svg", "wb") as f:
              f.write(r.content)
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/roadmap-card.svg
          git diff --cached --quiet || git commit -m "chore: refresh roadmap card"
          git push
